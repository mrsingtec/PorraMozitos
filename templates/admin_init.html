{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4 text-center">
        <i class="bi bi-shield-lock-fill text-warning" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Crear cuenta de administrador</h4>
        <p class="text-muted">No hay usuarios registrados. Crea la cuenta de admin para empezar.</p>
        <form method="POST">
          <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Usuario" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
          </div>
          <button type="submit" class="btn btn-warning w-100">Crear admin</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
