{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <span style="font-size: 3rem;">🏆</span>
          <h3 class="mt-2">PorraMozitos 2026</h3>
          <p class="text-muted">Inicia sesión para pronosticar</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p class="text-center mt-3 mb-0">
          ¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
