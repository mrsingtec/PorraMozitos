{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
          <h3 class="mt-2">Registrarse</h3>
          <p class="text-muted">Únete a la porra</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Elige tu usuario" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="••••••" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Registrarse</button>
        </form>
        <p class="text-center mt-3 mb-0">
          ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
